<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening in Notation…</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg-card: #161b22;
            --border: #30363d;
            --fg: #e6edf3;
            --fg-muted: #7d8590;
            --accent: #58a6ff;
            --green: #3fb950;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--fg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .logo {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: var(--fg-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status { color: var(--fg-muted); font-size: 14px; }
        .fallback { display: none; margin-top: 24px; }
        .fallback.show { display: block; }
        .fallback p { color: var(--fg-muted); font-size: 13px; margin-bottom: 16px; }
        .btn {
            display: inline-block;
            background: var(--accent);
            color: var(--bg);
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.9; }
        .link-info {
            margin-top: 20px;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: left;
            font-size: 12px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            color: var(--fg-muted);
            word-break: break-all;
        }
        .link-info dt { color: var(--fg); font-weight: 600; margin-top: 6px; }
        .link-info dt:first-child { margin-top: 0; }
        .link-info dd { margin-left: 0; margin-top: 2px; }
        .error { color: #f85149; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Notation</div>
        <div class="subtitle">Notebook editor backed by GitHub</div>

        <div id="loading">
            <div class="spinner"></div>
            <div class="status">Opening in Notation…</div>
        </div>

        <div id="fallback" class="fallback">
            <p>Didn't open automatically?</p>
            <a id="manualBtn" class="btn" href="#">Open in Notation</a>
            <p style="margin-top: 16px;">
                If Notation isn't installed or the link handler isn't registered,
                the button above may not work.
            </p>
        </div>

        <div id="error" class="fallback">
            <p class="error">This link is missing required parameters.</p>
        </div>

        <div id="linkInfo" class="link-info" style="display: none;">
            <dl>
                <dt>Repository</dt>
                <dd id="infoRepo"></dd>
                <dt>Branch</dt>
                <dd id="infoBranch"></dd>
                <dt>Path</dt>
                <dd id="infoPath"></dd>
            </dl>
        </div>
    </div>

    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var repo = params.get("repo");
            var branch = params.get("branch");
            var path = params.get("path");

            if (!repo || !branch || !path) {
                document.getElementById("loading").style.display = "none";
                document.getElementById("error").classList.add("show");
                return;
            }

            // Show link info
            document.getElementById("infoRepo").textContent = repo;
            document.getElementById("infoBranch").textContent = branch;
            document.getElementById("infoPath").textContent = path;
            document.getElementById("linkInfo").style.display = "block";

            // Build the notation: URI
            var notationUri = "notation:open"
                + "?repo=" + encodeURIComponent(repo)
                + "&branch=" + encodeURIComponent(branch)
                + "&path=" + encodeURIComponent(path);

            // Wire up the manual button
            document.getElementById("manualBtn").href = notationUri;

            // Attempt to open
            window.location = notationUri;

            // Show fallback after 2 seconds
            setTimeout(function () {
                document.getElementById("loading").style.display = "none";
                document.getElementById("fallback").classList.add("show");
            }, 2000);
        })();
    </script>
</body>
</html>
